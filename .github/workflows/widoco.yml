name: Deploy Widoco Documentation

on:
  push:
    branches: [main]
    paths:
      - 'dqvch.ttl'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Create output directory
        run: mkdir -p widoco-out && chmod 777 widoco-out

      - name: Run Widoco
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            ghcr.io/dgarijo/widoco:v1.4.25 \
            -ontFile /data/dqvch.ttl \
            -outFolder /data/widoco-out \
            -rewriteAll \
            -includeAnnotationProperties \
            -lang en \
            -noPlaceHolderText \
            -htaccess

      - name: Verify Widoco output
        run: |
          echo "Files generated by Widoco:"
          ls -la widoco-out/
          test -f widoco-out/index-en.html || (echo "ERROR: index-en.html missing" && exit 1)

      - name: Add index.html entry point
        run: cp widoco-out/index-en.html widoco-out/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./widoco-out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
