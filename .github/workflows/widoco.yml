name: Deploy Widoco Documentation

on:
  push:
    branches: [main]
    paths:
      - 'dqvch.ttl'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create output directory
        run: mkdir -p widoco-out && chmod 777 widoco-out

      - name: Run Widoco
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            ghcr.io/dgarijo/widoco:v1.4.25 \
            -confFile /data/config.properties \
            -ontFile /data/dqvch.ttl \
            -outFolder /data/widoco-out \
            -rewriteAll \
            -includeAnnotationProperties \
            -lang en \
            -noPlaceHolderText \
            -htaccess

      - name: Verify Widoco output
        run: |
          echo "Files generated by Widoco:"
          ls -la widoco-out/
          test -f widoco-out/index-en.html || (echo "ERROR: index-en.html missing" && exit 1)

      - name: Add index.html entry point
        run: cp widoco-out/index-en.html widoco-out/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./widoco-out
